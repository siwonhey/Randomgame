<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metal Blade — Beyblade Survival Battle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Rajdhani:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- ─── Game Area (full-screen background canvas) ─── -->
  <div id="game-area">
    <!-- Event title HUD: cross-fades in once the setup card fades out so
         the in-game / result frames keep contextual identity for screenshots
         and shared captures. Mirrors #event-title input via ui.js. -->
    <div id="title-hud"></div>
    <div id="status-bar"></div>
    <div id="timer-display"></div>
    <div id="countdown"></div>
  </div>

  <!-- ─── Popup mode chrome (overlay + close button — used during battle) ─── -->
  <div id="popup-backdrop"></div>
  <button id="popup-toggle" title="Edit Participants" aria-label="Edit Participants">&#x2699;</button>

  <!-- ─── Setup Panel ─── Centered card with all setup controls plus an
       embedded participants roster. Visible during idle; cross-fades out
       during battle phases (the .roster-corner below takes over as HUD).
       Re-opens during battle as a modal when ⚙ (#popup-toggle) is clicked. -->
  <section id="setup-panel">
    <!-- The setup-card wraps all setup content with a translucent fill so the
         input region reads as a distinct surface separate from the live canvas
         behind it. In popup mode the card becomes a true modal: solid fill,
         fixed width, popup-close anchored to its corner. -->
    <div class="setup-card">
      <button id="popup-close" title="Close" aria-label="Close">&times;</button>
      <div class="setup-brand">
        <img id="logo" src="logo.png" alt="Metal Blade">
        <p class="setup-tagline">DRIVEN BY PHYSICS — THE EXPERIENCE OF RANDOM SELECTION THROUGH VISUAL COLLISION</p>
      </div>

      <div class="setup-title">
        <input type="text" id="event-title" placeholder="EVENT TITLE" spellcheck="false">
      </div>

      <div class="setup-controls" id="participant-controls">
        <div id="name-input-wrap">
          <input type="text" id="name-input" placeholder="Add name" spellcheck="false">
          <button id="add-btn" title="Add">+</button>
        </div>
        <button id="shuffle-btn" class="nav-btn">Shuffle</button>
        <button id="csv-upload-btn" class="nav-btn">CSV</button>
        <input type="file" id="csv-input" accept=".csv,.txt,.tsv">
      </div>

      <!-- Participants list bundled INSIDE the card. Inherits the card's
           opacity, so it fades together with the card on phase transition.
           A mirror copy lives at .roster-corner below for the battle HUD. -->
      <aside class="roster-block roster-card">
        <div class="participants-wrap">
          <div class="participants"></div>
        </div>
        <div class="col-label">
          <span>Participants</span>
          <span class="count-display">0 / 30</span>
        </div>
      </aside>

      <div class="setup-cta">
        <button id="battle-btn" class="nav-btn primary" disabled>Battle Start</button>
      </div>
    </div>
  </section>

  <!-- ─── Corner Roster — fixed bottom-right HUD that fades in during
       intro/countdown/battle/result. Hidden during idle and popup-open
       (the card-embedded roster is the editable surface in those phases). -->
  <aside class="roster-block roster-corner">
    <div class="participants-wrap">
      <div class="participants"></div>
    </div>
    <div class="col-label">
      <span>Participants</span>
      <span class="count-display">0 / 30</span>
    </div>
  </aside>

  <!-- ─── Result Overlay ─── -->
  <div id="result-overlay">
    <!-- Order: spinning top first, then WINNER caption directly under it,
         then the winner's name. Keeps the label visually anchored to the
         3D image instead of floating at the top of the overlay. -->
    <div id="result-3d"></div>
    <div id="result-title">Winner</div>
    <div id="result-winner-name"></div>
    <div id="result-list"></div>
    <div class="result-actions">
      <button id="btn-copy">Copy Results</button>
      <button id="btn-retry" class="primary">Play Again</button>
    </div>
  </div>

  <!-- ─── Sound Toggle (fixed bottom-left) ─── -->
  <button id="sound-toggle" title="Toggle Sound">&#x1f50a;</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script type="importmap">

</script>

<script type="module" src="js/main.js"></script>
</body>
</html>
